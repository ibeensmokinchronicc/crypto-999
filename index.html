<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle,#0a0a0a,#000);
  color:white;
}

h1 {
  text-align:center;
  color:#c084fc;
}

.card {
  background:rgba(20,20,20,0.7);
  margin:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #9333ea;
}

button {
  background:#9333ea;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
}

.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
}

.hidden { display:none; }
.profit { color:#22c55e; }
.loss { color:#ef4444; }
</style>
</head>

<body>

<h1>999 Crypto</h1>

<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add</button>
</div>

<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
<canvas id="equity"></canvas>
</div>

<div id="alertsTab" class="hidden">
<input id="alertCoin">
<input id="alertPrice">
<button onclick="addAlert()">Set Alert</button>
</div>

<div id="stakingTab" class="hidden">
<input id="stakeCoin">
<input id="stakeAmount">
<button onclick="addStake()">Stake</button>
</div>

<div id="rewardsTab" class="hidden">
<h3 id="rewards"></h3>
</div>

<div class="tabs">
<button onclick="tab('portfolioTab')">💰</button>
<button onclick="tab('analyticsTab')">📊</button>
<button onclick="tab('alertsTab')">🔔</button>
<button onclick="tab('stakingTab')">🏦</button>
<button onclick="tab('rewardsTab')">💳</button>
</div>

<script>

function tab(id){
["portfolioTab","analyticsTab","alertsTab","stakingTab","rewardsTab"]
.forEach(t=>document.getElementById(t).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

async function load(){
const res = await fetch("/sync");
const data = await res.json();

let total=0, profit=0;
portfolio.innerHTML="";

data.trades.forEach(t=>{
const p=data.prices[t.coin]||0;
const val=t.amount*p;
const cost=t.amount*t.price;

total+=val;
profit+=val-cost;

portfolio.innerHTML+=`
<div class="card">
<h3>${t.coin}</h3>
<p>$${val.toFixed(2)}</p>
<p class="${val-cost>=0?'profit':'loss'}">
${(val-cost).toFixed(2)}
</p>
<p>${t.platform||"manual"}</p>
</div>`;
});

totalEl.innerText="Total: $"+total.toFixed(2);
profitEl.innerText="Profit: $"+profit.toFixed(2);
}

function addTrade(){
fetch("/trade",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({coin:coin.value,amount:+amount.value,price:+price.value})});
}

function addAlert(){
fetch("/alert",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({coin:alertCoin.value,price:+alertPrice.value})});
}

function addStake(){
fetch("/stake",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({coin:stakeCoin.value,amount:+stakeAmount.value})});
}

setInterval(load,5000);
load();

</script>
</body>
</html>
