<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle at top,#0f0f0f,#000);
  color:white;
  padding-bottom:90px;
}

/* HEADER */
h1 {
  text-align:center;
  color:#c084fc;
  text-shadow:0 0 30px #9333ea;
}

/* MENU BUTTON */
.menu-btn {
  position:absolute;
  top:15px;
  right:15px;
  background:rgba(20,20,20,0.7);
  border:1px solid rgba(147,51,234,0.4);
  backdrop-filter:blur(10px);
  border-radius:12px;
  padding:8px 12px;
  box-shadow:0 0 10px rgba(147,51,234,0.5);
}

/* MENU */
.menu {
  position:absolute;
  top:55px;
  right:15px;
  width:180px;
  background:rgba(20,20,20,0.85);
  backdrop-filter:blur(18px);
  border-radius:16px;
  padding:10px;
  border:1px solid rgba(147,51,234,0.3);
  box-shadow:0 10px 30px rgba(0,0,0,0.7),
              0 0 20px rgba(147,51,234,0.4);
  transform:translateY(-10px);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}

.menu.show {
  transform:translateY(0);
  opacity:1;
  pointer-events:auto;
}

.menu button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  width:100%;
  text-align:left;
}

/* CARD */
.card {
  background:rgba(25,25,25,0.6);
  margin:12px;
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(147,51,234,0.25);
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#0f0f0f;
  color:white;
}

/* BUTTON */
button {
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#9333ea,#6b21a8);
  color:white;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>999 Crypto 💀</h1>

<!-- MENU BUTTON -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- MENU -->
<div id="menu" class="menu">
  <button onclick="tab('portfolioTab')">💰 Portfolio</button>
  <button onclick="tab('geminiTab')">💳 Gemini</button>
  <button onclick="tab('analyticsTab')">📊 Analytics</button>
  <button onclick="tab('alertsTab')">🔔 Alerts</button>
  <button onclick="tab('stakingTab')">🏦 Staking</button>
  <button onclick="tab('aiTab')">🤖 AI</button>
  <button onclick="tab('liveTab')">📡 Live</button>
</div>

<!-- PORTFOLIO -->
<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add Trade</button>
<button onclick="enableNotifications()">Enable Notifications 🔔</button>
</div>

<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<!-- GEMINI -->
<div id="geminiTab" class="hidden">
<div class="card">
<h3>💎 Gemini Rewards</h3>
<div id="geminiStats"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
</div>

<!-- ALERTS -->
<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin">
<input id="alertPrice">
<button onclick="addAlert()">Set Alert</button>
</div>
</div>

<!-- STAKING -->
<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin">
<input id="stakeAmount">
<button onclick="addStake()">Add Stake</button>
</div>
</div>

<!-- AI -->
<div id="aiTab" class="hidden">
<div class="card">
<div id="aiBox"></div>
</div>
</div>

<!-- LIVE -->
<div id="liveTab" class="hidden">
<div class="card">
<canvas id="liveChart"></canvas>
</div>
<div id="livePrices"></div>
</div>

<script>

// MENU TOGGLE
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

// CLOSE MENU ON OUTSIDE CLICK
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu") && !e.target.closest(".menu-btn")){
    document.getElementById("menu").classList.remove("show");
  }
});

// TAB
function tab(id){
["portfolioTab","geminiTab","analyticsTab","alertsTab","stakingTab","aiTab","liveTab"]
.forEach(t=>document.getElementById(t).classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");
document.getElementById("menu").classList.remove("show");
}

// GLOBAL
let GLOBAL_DATA={};
let LIVE_PRICES={};

// LOAD
async function load(){
try{
const r=await fetch("/sync");
const d=await r.json();
GLOBAL_DATA=d;
localStorage.setItem("offlineData",JSON.stringify(d));
renderPortfolio(d);
renderGemini(d);
}catch{
const d=JSON.parse(localStorage.getItem("offlineData"));
if(d){
renderPortfolio(d);
renderGemini(d);
}
}
}

// PORTFOLIO
function renderPortfolio(data){
portfolio.innerHTML="";
let total=0,profit=0;

data.trades?.forEach(t=>{
const p=data.prices[t.coin]||0;
const val=t.amount*p;
const cost=t.amount*t.price;

total+=val;
profit+=val-cost;

portfolio.innerHTML+=`
<div class="card">
<h3>${t.coin}</h3>
<p>$${val.toFixed(2)}</p>
<p>${(val-cost).toFixed(2)}</p>
</div>`;
});

document.getElementById("total").innerText="$"+total.toFixed(2);
document.getElementById("profit").innerText="$"+profit.toFixed(2);
}

// GEMINI
function renderGemini(data){
let rewards=0;

data.transactions?.forEach(tx=>{
if(tx.currency==="XRP" && tx.type==="Credit"){
rewards+=parseFloat(tx.amount||0);
}
});

geminiStats.innerHTML=`💎 XRP Earned: ${rewards.toFixed(4)}`;
}

// LIVE XRP
setInterval(async ()=>{
const r=await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
const d=await r.json();
LIVE_PRICES.XRP=1/d.data.rates.XRP;
renderLive();
},2500);

function renderLive(){
livePrices.innerHTML=`
<div class="card">
<h3>XRP</h3>
<p>$${LIVE_PRICES.XRP?.toFixed(2)||0}</p>
</div>`;
}

// CHART
let cd={labels:[],datasets:[{data:[]}]};
new Chart(document.getElementById("liveChart"),{type:"line",data:cd});

setInterval(()=>{
if(LIVE_PRICES.XRP){
cd.labels.push("");
cd.datasets[0].data.push(LIVE_PRICES.XRP);
if(cd.labels.length>20){
cd.labels.shift();
cd.datasets[0].data.shift();
}
}
},2500);

// CACHE + LOAD
const cached=localStorage.getItem("offlineData");
if(cached){
const d=JSON.parse(cached);
renderPortfolio(d);
renderGemini(d);
}

setInterval(load,5000);
load();

</script>
</body>
</html>
