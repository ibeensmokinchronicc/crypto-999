<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle,#0a0a0a,#000);
  color:white;
  padding-bottom:90px;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeOut 1s ease forwards;
animation-delay:2.5s;
}

#logo{
font-size:60px;
color:#c084fc;
text-shadow:0 0 30px #9333ea;
animation:pulse 1.5s infinite;
}

/* HEADER */
h1 {
  text-align:center;
  color:#c084fc;
}

/* CARD */
.card {
  background:rgba(20,20,20,0.6);
  margin:12px;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(147,51,234,0.3);
}

/* NAV */
.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#000;
}

.tabs button { flex:1; }

.hidden{display:none;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

#bg{position:fixed;z-index:-1;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash"><div id="logo">999</div></div>

<canvas id="bg"></canvas>

<h1>999 Crypto 💀</h1>

<!-- PORTFOLIO -->
<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add Trade</button>
</div>
<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
</div>

<!-- REWARDS -->
<div id="rewardsTab" class="hidden">
<div class="card">
<h3>💎 Rewards</h3>
<div id="rewardsList"></div>
<p id="rewardTotal"></p>
<div style="background:#222;height:10px;">
<div id="gasBar" style="background:#9333ea;height:10px;width:0%"></div>
</div>
</div>
</div>

<!-- ELITE -->
<div id="eliteTab" class="hidden">
<div class="card">

<div id="platformData"></div>
<div id="riskData"></div>
<div id="tradeHistory"></div>
<div id="taxData"></div>
<div id="insightData"></div>

<!-- XRP UI -->
<div id="xrpStats"></div>

<div style="margin-top:10px;">
<div style="font-size:12px;">XRP Dominance</div>
<div style="background:#222;height:10px;">
<div id="xrpBar" style="height:10px;width:0%;background:#9333ea"></div>
</div>
</div>

<canvas id="rewardChart"></canvas>

</div>
</div>

<!-- ALERTS -->
<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin">
<input id="alertPrice">
<button onclick="addAlert()">Set Alert</button>
</div>
</div>

<!-- STAKING -->
<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin">
<input id="stakeAmount">
<button onclick="addStake()">Add Stake</button>
</div>
</div>

<!-- AI -->
<div id="aiTab" class="hidden">
<div class="card">
<h3>AI</h3>
<div id="aiBox"></div>
</div>
</div>

<!-- LIVE -->
<div id="liveTab" class="hidden">
<div class="card">
<canvas id="liveChart"></canvas>
</div>
<div id="livePrices"></div>
</div>

<!-- NAV -->
<div class="tabs">
<button onclick="tab('portfolioTab')">💰</button>
<button onclick="tab('analyticsTab')">📊</button>
<button onclick="tab('rewardsTab')">💎</button>
<button onclick="tab('eliteTab')">🧠</button>
<button onclick="tab('alertsTab')">🔔</button>
<button onclick="tab('stakingTab')">🏦</button>
<button onclick="tab('aiTab')">🤖</button>
<button onclick="tab('liveTab')">📡</button>
</div>

<script>

// REMOVE SPLASH
setTimeout(()=>{
const s=document.getElementById("splash");
if(s) s.style.display="none";
},3000);

// XRP MODE
let LIVE_PRICES={};
let rewardHistory=[];
let seenRewards=[];

// LIVE XRP FIRST
setInterval(async ()=>{
const res=await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
const data=await res.json();

["XRP","BTC","ETH"].forEach(c=>{
LIVE_PRICES[c]=1/data.data.rates[c];
});

renderLivePrices();

},2500);

function renderLivePrices(){
let html="";
for(let c in LIVE_PRICES){
html+=`<div class="card"><h3>${c}</h3><p>$${LIVE_PRICES[c].toFixed(4)}</p></div>`;
}
livePrices.innerHTML=html;
}

// XRP CHART
let chartData={labels:[],datasets:[{label:"XRP",data:[]}]};

let chart;

function initLiveChart(){
chart=new Chart(liveChart,{type:"line",data:chartData});
}

setInterval(()=>{
if(LIVE_PRICES["XRP"]){
chartData.labels.push("");
chartData.datasets[0].data.push(LIVE_PRICES["XRP"]);

if(chartData.labels.length>25){
chartData.labels.shift();
chartData.datasets[0].data.shift();
}

chart.update();
}
},2500);

initLiveChart();

// XRP ENGINE
async function runXRPEngine(){

const res=await fetch("/sync");
const data=await res.json();

let total=0,xrp=0;

data.balances?.forEach(b=>{
total+=b.usdValue;
if(b.currency==="XRP") xrp+=b.usdValue;
});

let dom = total ? (xrp/total)*100 : 0;

xrpStats.innerHTML=`
<p>$${xrp.toFixed(2)}</p>
<p>${dom.toFixed(2)}%</p>
`;

xrpBar.style.width=dom+"%";

// rewards
let newR=0;
data.transactions?.forEach(tx=>{
if(tx.currency==="XRP"&&tx.type==="Credit"){
newR+=parseFloat(tx.amount||0);
}
});

rewardHistory.push(newR);
if(rewardHistory.length>20) rewardHistory.shift();

renderRewardChart();

}

function renderRewardChart(){
new Chart(rewardChart,{
type:"line",
data:{labels:rewardHistory.map((_,i)=>i),
datasets:[{data:rewardHistory}]}
});
}

setInterval(runXRPEngine,6000);

// PARTICLES
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let particles=Array.from({length:30},()=>({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
r:Math.random()*2,
d:Math.random()*0.4
}));

function draw(){
ctx.clearRect(0,0,bg.width,bg.height);
ctx.fillStyle="rgba(147,51,234,0.3)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;
if(p.y>bg.height)p.y=0;
});
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
