<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto FINAL FIXED</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:white;
}

h1{
text-align:center;
color:#c084fc;
text-shadow:0 0 30px #9333ea;
}

#menuBtn{
position:fixed;
top:10px;
left:10px;
width:60px;
height:60px;
background:#111;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
z-index:999999;
}

#menu{
position:fixed;
top:80px;
left:10px;
background:#111;
border-radius:16px;
padding:10px;
display:none;
z-index:999999;
}

#menu button{
display:block;
width:100%;
padding:12px;
background:none;
color:white;
border:none;
text-align:left;
}

.tab{display:none; padding-top:80px;}
.active{display:block;}

.card{
background:#1a1a1a;
margin:12px;
padding:16px;
border-radius:16px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#111;
color:white;
border:none;
border-radius:10px;
}

button.action{
background:#9333ea;
padding:10px;
border:none;
border-radius:10px;
color:white;
width:100%;
}
</style>
</head>

<body>

<h1>999 Crypto 💀</h1>

<div id="menuBtn">☰</div>

<div id="menu">
<button data-tab="portfolio">Portfolio</button>
<button data-tab="rewards">Rewards</button>
<button data-tab="elite">Elite</button>
<button data-tab="live">Live</button>
</div>

<div id="portfolio" class="tab active">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button class="action" onclick="addTrade()">Add Trade</button>
</div>
<div id="portfolioList"></div>
<h2 id="total"></h2>
</div>

<div id="rewards" class="tab">
<div class="card">
<div id="rewardsList"></div>
<p id="today"></p>
<p id="predict"></p>
<canvas id="rewardChart"></canvas>
</div>
</div>

<div id="elite" class="tab">
<div class="card">
<div id="eliteData"></div>
</div>
</div>

<div id="live" class="tab">
<div class="card">
<canvas id="liveChart"></canvas>
</div>
<div id="livePrice"></div>
</div>

<script>

// MENU (FIXED)
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

btn.addEventListener("click",e=>{
e.stopPropagation();
menu.style.display = menu.style.display==="block"?"none":"block";
});

document.addEventListener("click",e=>{
if(!menu.contains(e.target)&&!btn.contains(e.target)){
menu.style.display="none";
}
});

document.querySelectorAll("#menu button").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(b.dataset.tab).classList.add("active");
menu.style.display="none";
};
});

// DATA
let history={};

// LOAD
async function load(){
try{
let r=await fetch("/sync");
let d=await r.json();
renderPortfolio(d);
renderRewards(d);
renderElite(d);
}catch{}
}

// PORTFOLIO
function renderPortfolio(d){
let total=0;
portfolioList.innerHTML="";
(d.trades||[]).forEach(t=>{
let val=t.amount*(d.prices?.[t.coin]||0);
total+=val;
portfolioList.innerHTML+=`<div class='card'>${t.coin} $${val.toFixed(2)}</div>`;
});
totalEl=document.getElementById("total");
if(totalEl) totalEl.innerText="$"+total.toFixed(2);
}

// REWARDS
function renderRewards(d){
let gas=0;
(d.transactions||[]).forEach(tx=>{
if(tx.type==="Debit"&&(tx.description||"").includes("gas")) gas+=Math.abs(tx.amount);
});
let reward=gas*0.04;

rewardsList.innerHTML=`Gas $${gas}<br>Reward $${reward.toFixed(2)}`;

let day=new Date().toISOString().split("T")[0];
history[day]=(history[day]||0)+reward;

today.innerText="Today: $"+history[day].toFixed(2);

let avg=Object.values(history).reduce((a,b)=>a+b,0)/(Object.keys(history).length||1);
predict.innerText="Projected: $"+(avg*30).toFixed(2);
}

// ELITE
function renderElite(d){
eliteData.innerText="Trades: "+(d.trades?.length||0);
}

// ACTION
async function addTrade(){
await fetch("/trade",{method:"POST",headers:{'Content-Type':'application/json'},
body:JSON.stringify({coin:coin.value,amount:+amount.value,price:+price.value})});
load();
}

// LIVE
let chart;
let data={labels:[],datasets:[{data:[]}]};

function init(){
chart=new Chart(document.getElementById("liveChart"),{type:"line",data});
}

setInterval(async()=>{
try{
let r=await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
let d=await r.json();
let p=1/d.data.rates.XRP;
livePrice.innerText="$"+p.toFixed(2);

data.labels.push("");
data.datasets[0].data.push(p);

if(data.labels.length>20){
data.labels.shift();
data.datasets[0].data.shift();
}

chart.update();
}catch{}
},3000);

init();
setInterval(load,5000);
load();

</script>

</body>
</html>
