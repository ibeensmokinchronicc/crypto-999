<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle,#0a0a0a,#000);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
h1 {
  text-align:center;
  color:#c084fc;
  text-shadow:0 0 20px #9333ea;
  animation:fadeIn 1s ease;

/* CARD */
.card {

  margin:12px;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(147,51,234,0.3);

  animation:slideUp .4s ease;
}

.card:hover {
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 25px #9333ea;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#9333ea,#6b21a8);
  color:white;
}
  
/* NAV */
.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.9);
  border-top:1px solid #9333ea;
}

.tabs button { flex:1; }

.hidden { display:none; }
.profit { color:#22c55e; }
.loss { color:#ef4444; }

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes slideUp {
  from {transform:translateY(20px);opacity:0;}
  to {transform:translateY(0);opacity:1;}
}

/* PARTICLES */
#bg {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

<script>

// (YOUR FULL EXISTING SCRIPT STAYS EXACTLY THE SAME ABOVE THIS POINT)

// PARTICLES (ADDED — SAFE)
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

bg.width=window.innerWidth;
bg.height=window.innerHeight;

let particles=Array.from({length:40},()=>({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
r:Math.random()*2,
d:Math.random()*0.5
}));

function drawParticles(){
ctx.clearRect(0,0,bg.width,bg.height);
ctx.fillStyle="rgba(147,51,234,0.3)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;

if(p.y>bg.height){
p.y=0;
p.x=Math.random()*bg.width;
}
});

requestAnimationFrame(drawParticles);
}

drawParticles();
// =====================
// 🔔 NOTIFICATIONS SYSTEM (SAFE ADD)
// =====================
async function enableNotifications(){
if(!("Notification" in window)) return;

const permission = await Notification.requestPermission();

if(permission === "granted"){
new Notification("999 Crypto 💀", {
body:"Notifications Enabled",
icon:"/icon-192.png"
});
}
}

function sendNotification(title, body){
if(Notification.permission === "granted"){
new Notification(title, {
body,
icon:"/icon-192.png"
});
}
}
// =====================
// 🔔 SMART ALERT + REWARD SYSTEM (NO SPAM)
// =====================

// store seen rewards
let seenRewards = JSON.parse(localStorage.getItem("seenRewards") || "[]");

setInterval(async () => {
try{
const res = await fetch("/sync");
const data = await res.json();

// PRICE ALERTS
data.alerts?.forEach(a=>{
const price = data.prices[a.coin] || 0;

if(price >= a.price){
sendNotification("🚨 Price Alert", `${a.coin} hit $${a.price}`);
}
});

// XRP REWARDS (SMART)
data.transactions?.forEach(tx=>{
if(tx.currency==="XRP" && tx.type==="Credit"){

const id = tx.timestamp || tx.txid || tx.amount + tx.date;

// if not seen before
if(!seenRewards.includes(id)){
seenRewards.push(id);

// save memory
localStorage.setItem("seenRewards", JSON.stringify(seenRewards));

// notify once
sendNotification("💎 XRP Reward", `+${tx.amount} XRP received`);
}

}
});

}catch(e){
console.log("alert system error");
}
}, 7000);

  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

  // =====================
// 🧠 AI PORTFOLIO OPTIMIZER
// =====================
function runAI(data){

if(!document.getElementById("aiBox")) return;

let suggestions=[];

// CALCULATE POSITIONS
let positions={};

data.trades.forEach(t=>{
const val = t.amount * (data.prices[t.coin] || 0);
positions[t.coin] = (positions[t.coin] || 0) + val;
});

// TOTAL VALUE
const total = Object.values(positions).reduce((a,b)=>a+b,0);

// ANALYZE
let best=null, worst=null;

for(let coin in positions){

const val = positions[coin];
const percent = (val/total)*100;

// OVEREXPOSED
if(percent > 50){
suggestions.push(`⚠️ ${coin} is ${percent.toFixed(1)}% of portfolio`);
}

// LOW POSITION
if(percent < 5){
suggestions.push(`📉 ${coin} is under 5% (low exposure)`);
}

// TRACK BEST/WORST
const trade = data.trades.find(t=>t.coin===coin);
if(trade){
const pnl = (trade.amount*(data.prices[coin]||0))-(trade.amount*trade.price);

if(!best || pnl > best.pnl) best={coin,pnl};
if(!worst || pnl < worst.pnl) worst={coin,pnl};
}

}

// FINAL INSIGHTS
if(best) suggestions.push(`🔥 Best: ${best.coin} (+$${best.pnl.toFixed(2)})`);
if(worst) suggestions.push(`💀 Worst: ${worst.coin} ($${worst.pnl.toFixed(2)})`);

// RISK WARNING
if(total > 0){
const largest = Math.max(...Object.values(positions));
if((largest/total)*100 > 60){
suggestions.push("🚨 High concentration risk");
}
}

// RENDER
document.getElementById("aiBox").innerHTML = suggestions.map(s=>`<p>${s}</p>`).join("");

}

  // =====================
// 🧠 AUTO RUN AI (NO load() NEEDED)
// =====================
setInterval(() => {
if (GLOBAL_DATA && GLOBAL_DATA.trades) {
runAI(GLOBAL_DATA);
}
}, 5000);

  // =====================
// 📡 LIVE MARKET STREAM
// =====================
let LIVE_PRICES = {};

async function startLivePrices(){

setInterval(async ()=>{

try{
const res = await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
const data = await res.json();
const rates = data.data.rates;

// convert to USD price
const coins = ["BTC","ETH","XRP","SOL","DOGE"];

coins.forEach(c=>{
if(rates[c]){
LIVE_PRICES[c] = 1 / rates[c];
}
});

renderLivePrices();
const selected = "XRP"; // change dynamically later
if(LIVE_PRICES[selected]) updateChart(LIVE_PRICES[selected]);
  
}catch(e){
console.log("live price error");
}

}, 2500);
}

// =====================
// 🎨 RENDER LIVE PRICES
// =====================
function renderLivePrices(){

if(!document.getElementById("livePrices")) return;

let html="";

Object.keys(LIVE_PRICES).forEach(c=>{
html+=`
<div class="card">
<h3>${c}</h3>
<p>$${LIVE_PRICES[c].toFixed(2)}</p>
</div>
`;
});

document.getElementById("livePrices").innerHTML = html;
}

// START STREAM
startLivePrices();
  
</// =====================
// 📊 LIVE CHART SYSTEM
// =====================
let liveChart;
let chartData = {
labels: [],
datasets: [{
label: "BTC",
data: [],
borderWidth: 2,
tension: 0.4
}]
};

// INIT CHART
function initLiveChart(){
const ctx = document.getElementById("liveChart");

if(!ctx) return;

liveChart = new Chart(ctx, {
type: "line",
data: chartData,
options: {
responsive: true,
plugins: { legend: { display: false } },
scales: {
x: { display: false },
y: { display: true }
}
}
});
}

// UPDATE CHART
function updateChart(price){

const now = new Date().toLocaleTimeString();

chartData.labels.push(now);
chartData.datasets[0].data.push(price);

// limit length
if(chartData.labels.length > 20){
chartData.labels.shift();
chartData.datasets[0].data.shift();
}

liveChart.update();
  initLiveChart();
}script>
