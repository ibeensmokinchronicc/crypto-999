<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:radial-gradient(circle at top,#0f0f0f,#000);
  color:white;
  overflow-x:hidden;
  padding-bottom:90px;
}

h1 {
  text-align:center;
  font-size:28px;
  margin:16px 0;
  color:#c084fc;
  text-shadow:0 0 35px rgba(147,51,234,0.7);
}

.card {
  background:rgba(25,25,25,0.6);
  margin:12px;
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(147,51,234,0.25);
  backdrop-filter:blur(14px);
  box-shadow:
    0 4px 25px rgba(0,0,0,0.5),
    0 0 20px rgba(147,51,234,0.2);
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#0f0f0f;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#9333ea,#6b21a8);
  color:white;
}

.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.9);
}

.tabs button { flex:1; }

.hidden { display:none; }

#bg { position:fixed; z-index:-1; }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>999 Crypto 💀</h1>

<!-- PORTFOLIO -->
<div id="portfolioTab">
<div class="card">

<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">

<button onclick="addTrade()">Add Trade</button>

<!-- 🔔 NOTIFICATION BUTTON (ADDED) -->
<button onclick="enableNotifications()">Enable Notifications 🔔</button>

</div>

<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
</div>

<!-- REWARDS -->
<div id="rewardsTab" class="hidden">
<div class="card">
<h3>💎 Rewards</h3>
<div id="rewardsList"></div>
<p id="rewardTotal"></p>
<div style="background:#222;height:10px;border-radius:10px;">
<div id="gasBar" style="background:#9333ea;height:10px;width:0%;border-radius:10px"></div>
</div>
</div>
</div>

<!-- ELITE -->
<div id="eliteTab" class="hidden">
<div class="card">
<div id="platformData"></div>
<div id="riskData"></div>
<div id="tradeHistory"></div>
<div id="taxData"></div>
<div id="insightData"></div>
</div>
</div>

<!-- ALERTS -->
<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin" placeholder="Coin">
<input id="alertPrice" placeholder="Price">
<button onclick="addAlert()">Set Alert</button>
</div>
</div>

<!-- STAKING -->
<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin" placeholder="Coin">
<input id="stakeAmount" placeholder="Amount">
<button onclick="addStake()">Add Stake</button>
</div>
</div>

<!-- AI -->
<div id="aiTab" class="hidden">
<div class="card">
<h3>🤖 AI Insights</h3>
<div id="aiBox"></div>
</div>
</div>

<!-- LIVE -->
<div id="liveTab" class="hidden">
<div class="card">
<h3>📡 Live Market</h3>
<canvas id="liveChart"></canvas>
</div>
<div id="livePrices"></div>
</div>

<!-- NAV -->
<div class="tabs">
<button onclick="tab('portfolioTab')">💰</button>
<button onclick="tab('analyticsTab')">📊</button>
<button onclick="tab('rewardsTab')">💎</button>
<button onclick="tab('eliteTab')">🧠</button>
<button onclick="tab('alertsTab')">🔔</button>
<button onclick="tab('stakingTab')">🏦</button>
<button onclick="tab('aiTab')">🤖</button>
<button onclick="tab('liveTab')">📡</button>
</div>

<script>

// =====================
// 🌐 GLOBAL STATE
// =====================
let GLOBAL_DATA = {};
let LIVE_PRICES = {};
let seenRewards = JSON.parse(localStorage.getItem("seenRewards") || "[]");

// =====================
// 🔔 NOTIFICATIONS
// =====================
async function enableNotifications(){
  if(!("Notification" in window)){
    alert("Not supported");
    return;
  }

  const permission = await Notification.requestPermission();

  if(permission === "granted"){
    alert("Notifications ON 🔥");
  }
}

function sendNotification(title, body){
  if(Notification.permission === "granted"){
    new Notification(title, {
      body,
      icon:"/icon-192.png"
    });
  }
}

// =====================
// 📡 LOAD DATA (BACKEND)
// =====================
async function load(){
  try{
    const res = await fetch("/sync");
    const data = await res.json();
    GLOBAL_DATA = data;

    renderPortfolio(data);
    renderRewards(data);

  }catch(e){
    console.log("sync failed", e);
  }
}

// =====================
// 💰 PORTFOLIO
// =====================
function renderPortfolio(data){

  let total = 0;
  let profit = 0;

  const container = document.getElementById("portfolio");
  container.innerHTML = "";

  data.trades?.forEach(t=>{
    const price = data.prices[t.coin] || 0;
    const value = t.amount * price;
    const cost = t.amount * t.price;

    total += value;
    profit += value - cost;

    container.innerHTML += `
    <div class="card">
      <h3>${t.coin}</h3>
      <p>$${value.toFixed(2)}</p>
      <p>${(value-cost).toFixed(2)}</p>
    </div>`;
  });

  document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
  document.getElementById("profit").innerText = "Profit: $" + profit.toFixed(2);
}

// =====================
// 💎 REWARDS
// =====================
function renderRewards(data){

  if(!document.getElementById("rewardsList")) return;

  let total = 0;
  let html = "";

  data.rewards?.forEach(r=>{
    total += r.amount;
    html += `<p>${r.coin}: ${r.amount}</p>`;
  });

  // AUTO XRP DETECTION
  data.transactions?.forEach(tx=>{
    if(tx.currency==="XRP" && tx.type==="Credit"){

      const id = tx.txid || tx.timestamp || tx.amount;

      if(!seenRewards.includes(id)){
        seenRewards.push(id);
        localStorage.setItem("seenRewards", JSON.stringify(seenRewards));

        sendNotification("💎 XRP Reward", `+${tx.amount} XRP`);
      }

      total += parseFloat(tx.amount || 0);
      html += `<p>🔥 XRP: ${tx.amount}</p>`;
    }
  });

  document.getElementById("rewardsList").innerHTML = html;
  document.getElementById("rewardTotal").innerText = "Total: " + total.toFixed(4);
}

// =====================
// 🔘 BUTTON FIXES
// =====================
async function addTrade(){
  await fetch("/trade",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      coin:coin.value.toUpperCase(),
      amount:+amount.value,
      price:+price.value
    })
  });

  load();
}

async function addAlert(){
  await fetch("/alert",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      coin:alertCoin.value.toUpperCase(),
      price:+alertPrice.value
    })
  });

  alert("Alert set 🔔");
}

async function addStake(){
  await fetch("/stake",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      coin:stakeCoin.value.toUpperCase(),
      amount:+stakeAmount.value
    })
  });

  alert("Stake added 🏦");
}

// =====================
// 📡 LIVE PRICES
// =====================
setInterval(async ()=>{
  try{
    const res = await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
    const data = await res.json();

    ["BTC","ETH","XRP"].forEach(c=>{
      LIVE_PRICES[c] = 1 / data.data.rates[c];
    });

    renderLivePrices();

    checkAlerts();

  }catch{}
},2500);

function renderLivePrices(){
  let html="";
  for(let c in LIVE_PRICES){
    html += `<div class="card"><h3>${c}</h3><p>$${LIVE_PRICES[c].toFixed(2)}</p></div>`;
  }
  document.getElementById("livePrices").innerHTML = html;
}

// =====================
// 🚨 ALERT CHECK
// =====================
function checkAlerts(){

  GLOBAL_DATA.alerts?.forEach(a=>{
    const price = LIVE_PRICES[a.coin];

    if(price && price >= a.price){
      sendNotification("🚨 Price Hit", `${a.coin} hit $${a.price}`);
    }
  });

}

// =====================
// 📊 LIVE XRP CHART
// =====================
let chartData = {labels:[],datasets:[{data:[],tension:.4}]};

function initLiveChart(){
  const ctx = document.getElementById("liveChart");
  if(!ctx) return;

  new Chart(ctx,{
    type:"line",
    data:chartData
  });
}

setInterval(()=>{
  if(LIVE_PRICES["XRP"]){
    chartData.labels.push("");
    chartData.datasets[0].data.push(LIVE_PRICES["XRP"]);

    if(chartData.labels.length > 20){
      chartData.labels.shift();
      chartData.datasets[0].data.shift();
    }
  }
},2500);

initLiveChart();

// =====================
// 🔁 AUTO LOAD
// =====================
setInterval(load, 5000);
load();

// =====================
// ⚙️ SERVICE WORKER
// =====================
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js");
}
// =====================
// 💀 LEVEL 2 NOTIFICATIONS SYSTEM
// =====================

// SOUND (silent fallback if not allowed)
const alertSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// cooldown system (prevents spam)
let notifMemory = JSON.parse(localStorage.getItem("notifMemory") || "{}");

function canNotify(key, cooldown = 30000){
  const now = Date.now();

  if(!notifMemory[key] || now - notifMemory[key] > cooldown){
    notifMemory[key] = now;
    localStorage.setItem("notifMemory", JSON.stringify(notifMemory));
    return true;
  }

  return false;
}

// UPGRADED NOTIFICATION
function sendSmartNotification(title, body, tag){

  if(Notification.permission !== "granted") return;

  // prevent spam
  if(!canNotify(tag)) return;

  // play sound
  try { alertSound.play(); } catch {}

  new Notification(title, {
    body,
    icon:"/icon-192.png",
    badge:"/icon-192.png",
    tag,
    renotify:true
  });
}

// =====================
// 💎 REWARD NOTIFICATIONS (UPGRADE)
// =====================
function checkRewardNotifications(data){

  data.transactions?.forEach(tx=>{
    if(tx.currency === "XRP" && tx.type === "Credit"){

      const id = tx.txid || tx.timestamp || tx.amount;

      if(!seenRewards.includes(id)){
        seenRewards.push(id);
        localStorage.setItem("seenRewards", JSON.stringify(seenRewards));

        sendSmartNotification(
          "💎 XRP Reward",
          `+${parseFloat(tx.amount).toFixed(4)} XRP received`,
          "xrp-reward"
        );
      }
    }
  });

}

// =====================
// 🚨 PRICE ALERT UPGRADE
// =====================
function checkPriceNotifications(){

  GLOBAL_DATA.alerts?.forEach(a=>{
    const price = LIVE_PRICES[a.coin];

    if(price && price >= a.price){

      sendSmartNotification(
        "🚨 Price Hit",
        `${a.coin} reached $${price.toFixed(2)}`,
        `price-${a.coin}`
      );

    }
  });

}

// =====================
// 💰 PROFIT ALERT SYSTEM
// =====================
function checkProfitNotifications(data){

  let totalCost = 0;
  let totalValue = 0;

  data.trades?.forEach(t=>{
    const price = data.prices[t.coin] || 0;

    totalCost += t.amount * t.price;
    totalValue += t.amount * price;
  });

  const profit = totalValue - totalCost;

  // trigger every $100 gain
  if(profit > 0){

    const rounded = Math.floor(profit / 100) * 100;

    if(rounded > 0){
      sendSmartNotification(
        "💰 Profit Milestone",
        `You are up $${rounded}+`,
        "profit"
      );
    }
  }
}

// =====================
// 🔁 HOOK INTO YOUR SYSTEM
// =====================

// extend your existing load()
const originalLoad = load;

load = async function(){
  await originalLoad();

  if(GLOBAL_DATA){
    checkRewardNotifications(GLOBAL_DATA);
    checkProfitNotifications(GLOBAL_DATA);
  }
};

// extend live price loop
setInterval(()=>{
  checkPriceNotifications();
}, 4000);
</script>

</body>
</html>
