<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:radial-gradient(circle,#0a0a0a,#000);
color:white;
padding-bottom:90px;
}

/* HEADER */
h1{
text-align:center;
color:#c084fc;
text-shadow:0 0 30px #9333ea;
}

/* MENU */
.menu-btn{
position:absolute;
top:15px;
right:15px;
background:rgba(20,20,20,0.7);
border-radius:12px;
padding:10px;
}

.menu{
position:absolute;
top:60px;
right:15px;
background:rgba(20,20,20,0.95);
border-radius:16px;
padding:10px;
display:none;
}

.menu.show{display:block;}

.menu button{
width:100%;
background:none;
color:white;
padding:10px;
}

/* CARD */
.card{
background:rgba(25,25,25,0.6);
margin:12px;
padding:16px;
border-radius:16px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:6px 0;
background:#111;
color:white;
border:none;
border-radius:12px;
}

/* BUTTON */
button{
background:linear-gradient(135deg,#9333ea,#6b21a8);
border:none;
color:white;
padding:12px;
border-radius:12px;
width:100%;
margin-top:6px;
}

.hidden{display:none;}
</style>
</head>

<body>

<h1>999 Crypto 💀</h1>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div id="menu" class="menu">
<<div id="menu" class="menu">

<button onclick="openTab('portfolioTab')">💰 Portfolio</button>
<button onclick="openTab('analyticsTab')">📊 Analytics</button>
<button onclick="openTab('rewardsTab')">💎 Rewards</button>
<button onclick="openTab('eliteTab')">🧠 Elite</button>
<button onclick="openTab('alertsTab')">🔔 Alerts</button>
<button onclick="openTab('stakingTab')">🏦 Staking</button>
<button onclick="openTab('aiTab')">🤖 AI</button>
<button onclick="openTab('liveTab')">📡 Live</button>

</div>

<!-- PORTFOLIO -->
<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add Trade</button>
<button onclick="enableNotifications()">Enable Notifications 🔔</button>
</div>
<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<!-- REWARDS -->
<div id="rewardsTab" class="hidden">
<div class="card">
<h3>💎 Rewards</h3>

<div id="rewardsList"></div>
<p id="rewardTotal"></p>

<div style="background:#222;height:10px;border-radius:10px;">
<div id="gasBar" style="background:#9333ea;height:10px;width:0%;border-radius:10px"></div>
</div>

<hr>

<h4>📅 Monthly Tracker</h4>
<p id="monthlyGas"></p>

<h4>⚡ Today</h4>
<p id="todayRewards"></p>

<h4>🔮 Prediction</h4>
<p id="prediction"></p>

<canvas id="rewardChart"></canvas>

</div>
</div>

<!-- ELITE -->
<div id="eliteTab" class="hidden">
<div class="card">
<div id="platformData"></div>
<div id="riskData"></div>
<div id="tradeHistory"></div>
<div id="taxData"></div>
<div id="insightData"></div>
</div>
</div>

<!-- ALERTS -->
<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin">
<input id="alertPrice">
<button onclick="addAlert()">Set Alert</button>
</div>
</div>

<!-- STAKING -->
<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin">
<input id="stakeAmount">
<button onclick="addStake()">Add Stake</button>
</div>
</div>

<!-- AI -->
<div id="aiTab" class="hidden">
<div class="card">
<div id="aiBox"></div>
</div>
</div>

<!-- LIVE -->
<div id="liveTab" class="hidden">
<div class="card">
<canvas id="liveChart"></canvas>
</div>
<div id="livePrices"></div>
</div>

<script>

// MENU
function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.classList.toggle("show");
}
}
// GLOBAL
let GLOBAL_DATA={};
let LIVE_PRICES={};
let rewardHistory = JSON.parse(localStorage.getItem("rewardHistory")||"{}");
let monthlyData = JSON.parse(localStorage.getItem("monthlyData")||"{}");
let currentTab = "portfolioTab";

function openTab(id){

  if(id === currentTab) return;

  if(navigator.vibrate) navigator.vibrate(10);

  const tabs = [
    "portfolioTab",
    "analyticsTab",
    "rewardsTab",
    "eliteTab",
    "alertsTab",
    "stakingTab",
    "aiTab",
    "liveTab"
  ];

  const current = document.getElementById(currentTab);
  const next = document.getElementById(id);

  const dir = tabs.indexOf(id) > tabs.indexOf(currentTab) ? -100 : 100;

  next.style.transform = `translateX(${dir}%)`;
  next.classList.remove("hidden");

  setTimeout(()=>{
    next.style.transition = "all .3s ease";
    next.style.transform = "translateX(0)";
    current.style.transform = `translateX(${dir*-1}%)`;
  },10);

  setTimeout(()=>{
    current.classList.add("hidden");
    current.style.transform = "";
    next.style.transition = "";
    currentTab = id;
  },300);

  toggleMenu();
}
// LOAD
async function load(){
try{
const r=await fetch("/sync");
const d=await r.json();
GLOBAL_DATA=d;
localStorage.setItem("offlineData",JSON.stringify(d));

renderPortfolio(d);
renderRewards(d);
renderElite(d);

}catch{
const d=JSON.parse(localStorage.getItem("offlineData"));
if(d){
renderPortfolio(d);
renderRewards(d);
renderElite(d);
}
}
}

// PORTFOLIO
function renderPortfolio(data){
portfolio.innerHTML="";
let total=0;

data.trades?.forEach(t=>{
const p=data.prices[t.coin]||0;
const val=t.amount*p;
total+=val;

portfolio.innerHTML+=`<div class="card">${t.coin} $${val.toFixed(2)}</div>`;
});

document.getElementById("total").innerText="$"+total.toFixed(2);
}

// =====================
// 💎 REWARDS SYSTEM
// =====================
function renderRewards(data){

let gas=0,dining=0,grocery=0,other=0,totalRewards=0;

data.transactions?.forEach(tx=>{
const amt=Math.abs(parseFloat(tx.amount||0));
const desc=(tx.description||"").toLowerCase();

if(tx.type==="Debit"){
if(desc.includes("gas")) gas+=amt;
else if(desc.includes("food")) dining+=amt;
else if(desc.includes("market")) grocery+=amt;
else other+=amt;
}

if(tx.currency==="XRP" && tx.type==="Credit"){
totalRewards+=parseFloat(tx.amount||0);
}
});

// GEMINI LOGIC
let gasEligible=Math.min(gas,300);
let gasOverflow=Math.max(gas-300,0);

const rewardsUSD=
(gasEligible*0.04)+
(gasOverflow*0.01)+
(dining*0.03)+
(grocery*0.02)+
(other*0.01);

const xrpPrice=data.prices["XRP"]||0;
const estimatedXRP=xrpPrice?(rewardsUSD/xrpPrice):0;

// UI
rewardsList.innerHTML=`
<p>Gas: $${gas.toFixed(2)}</p>
<p>Dining: $${dining.toFixed(2)}</p>
<p>Grocery: $${grocery.toFixed(2)}</p>
<p>Other: $${other.toFixed(2)}</p>
<hr>
<p>Estimated: ${estimatedXRP.toFixed(4)} XRP</p>
`;

rewardTotal.innerText="Actual XRP: "+totalRewards.toFixed(4);

// GAS BAR
gasBar.style.width=Math.min((gas/300)*100,100)+"%";

// =====================
// 💀 MAX ENGINE
// =====================

const today=new Date().toISOString().split("T")[0];

if(!rewardHistory[today]) rewardHistory[today]=0;
rewardHistory[today]+=estimatedXRP;
localStorage.setItem("rewardHistory",JSON.stringify(rewardHistory));

// MONTH
const key=new Date().getMonth();
if(!monthlyData[key]) monthlyData[key]={gas:0};
monthlyData[key].gas=gas;

monthlyGas.innerText="Gas Used: $"+gas.toFixed(2)+"/300";
todayRewards.innerText="Today: "+rewardHistory[today].toFixed(4)+" XRP";

// PREDICTION
const days=Object.keys(rewardHistory).length||1;
const avg=Object.values(rewardHistory).reduce((a,b)=>a+b,0)/days;
const projected=avg*30;

prediction.innerText="Projected: "+projected.toFixed(2)+" XRP";

// CHART
const ctx=document.getElementById("rewardChart");
new Chart(ctx,{
type:"line",
data:{
labels:Object.keys(rewardHistory).slice(-7),
datasets:[{data:Object.values(rewardHistory).slice(-7)}]
}
});
}

// =====================
// 🧠 ELITE
// =====================
function renderElite(data){

let cost=0,value=0;

data.trades?.forEach(t=>{
cost+=t.amount*t.price;
value+=t.amount*(data.prices[t.coin]||0);
});

taxData.innerHTML=`PnL: $${(value-cost).toFixed(2)}`;
}

// LIVE XRP
setInterval(async()=>{
const r=await fetch("https://api.coinbase.com/v2/exchange-rates?currency=USD");
const d=await r.json();
LIVE_PRICES.XRP=1/d.data.rates.XRP;

livePrices.innerHTML=`$${LIVE_PRICES.XRP.toFixed(2)}`;
},2500);

// LOAD LOOP
setInterval(load,5000);
load();
function openTab(id){
  if(id === currentTab) return;

  const tabs = [
    "portfolioTab",
    "analyticsTab",
    "rewardsTab",
    "eliteTab",
    "alertsTab",
    "stakingTab",
    "aiTab",
    "liveTab"
  ];

  const current = document.getElementById(currentTab);
  const next = document.getElementById(id);

  const dir = tabs.indexOf(id) > tabs.indexOf(currentTab) ? -100 : 100;

  next.style.transform = `translateX(${dir}%)`;
  next.classList.remove("hidden");

  setTimeout(()=>{
    next.style.transition = "all .3s ease";
    next.style.transform = "translateX(0)";
    current.style.transform = `translateX(${dir*-1}%)`;
  },10);

  setTimeout(()=>{
    current.classList.add("hidden");
    current.style.transform = "";
    next.style.transition = "";
    currentTab = id;
  },300);

  toggleMenu();
}
  let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e=>{
  const diff = e.changedTouches[0].screenX - startX;

  const tabs = [
    "portfolioTab",
    "analyticsTab",
    "rewardsTab",
    "eliteTab",
    "alertsTab",
    "stakingTab",
    "aiTab",
    "liveTab"
  ];

  let i = tabs.indexOf(currentTab);

  if(diff > 60 && i > 0) openTab(tabs[i-1]);
  if(diff < -60 && i < tabs.length-1) openTab(tabs[i+1]);
});
</script>
  
</body>
</html>
