<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle,#0a0a0a,#000);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
h1 {
  text-align:center;
  color:#c084fc;
  text-shadow:0 0 20px #9333ea;
  animation:fadeIn 1s ease;
}

/* CARD */
.card {
  background:rgba(20,20,20,0.6);
  margin:12px;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(147,51,234,0.3);
  backdrop-filter:blur(10px);
  box-shadow:0 0 15px rgba(147,51,234,0.2);
  transition:all .25s ease;
  animation:slideUp .4s ease;
}

.card:hover {
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 25px #9333ea;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#9333ea,#6b21a8);
  color:white;
}

/* NAV */
.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:rgba(0,0,0,0.9);
  border-top:1px solid #9333ea;
}

.tabs button { flex:1; }

.hidden { display:none; }
.profit { color:#22c55e; }
.loss { color:#ef4444; }

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes slideUp {
  from {transform:translateY(20px);opacity:0;}
  to {transform:translateY(0);opacity:1;}
}

/* PARTICLES */
#bg {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>999 Crypto 💀</h1>

<!-- YOUR EXISTING UI (UNCHANGED) -->
<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add Trade</button>
</div>

<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
</div>

<div id="rewardsTab" class="hidden">
<div class="card">
<h3>💎 Rewards</h3>
<div id="rewardsList"></div>
<p id="rewardTotal"></p>
<div style="background:#222;height:10px;">
<div id="gasBar" style="background:#9333ea;height:10px;width:0%"></div>
</div>
</div>
</div>

<div id="eliteTab" class="hidden">
<div class="card">
<div id="platformData"></div>
<div id="riskData"></div>
<div id="tradeHistory"></div>
<div id="taxData"></div>
<div id="insightData"></div>
</div>
</div>

<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin" placeholder="Coin">
<input id="alertPrice" placeholder="Price">
<button onclick="addAlert()">Set Alert</button>
</div>
</div>

<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin" placeholder="Coin">
<input id="stakeAmount" placeholder="Amount">
<button onclick="addStake()">Add Stake</button>
</div>
</div>

<div class="tabs">
<button onclick="tab('portfolioTab')">💰</button>
<button onclick="tab('analyticsTab')">📊</button>
<button onclick="tab('rewardsTab')">💎</button>
<button onclick="tab('eliteTab')">🧠</button>
<button onclick="tab('alertsTab')">🔔</button>
<button onclick="tab('stakingTab')">🏦</button>
</div>

<script>

// (YOUR FULL EXISTING SCRIPT STAYS EXACTLY THE SAME ABOVE THIS POINT)

// PARTICLES (ADDED — SAFE)
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

bg.width=window.innerWidth;
bg.height=window.innerHeight;

let particles=Array.from({length:40},()=>({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
r:Math.random()*2,
d:Math.random()*0.5
}));

function drawParticles(){
ctx.clearRect(0,0,bg.width,bg.height);
ctx.fillStyle="rgba(147,51,234,0.3)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;

if(p.y>bg.height){
p.y=0;
p.x=Math.random()*bg.width;
}
});

requestAnimationFrame(drawParticles);
}

drawParticles();

</script>

</body>
</html>
