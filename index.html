<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>999 Crypto</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#000; color:white; font-family:-apple-system; }
.card { background:#111; padding:12px; margin:10px; border-radius:10px; }
.tabs { position:fixed; bottom:0; width:100%; display:flex; }
.tabs button { flex:1; padding:10px; }
.hidden { display:none; }
.profit { color:lime; }
.loss { color:red; }
</style>
</head>

<body>

<h1>999 Crypto 💀</h1>

<!-- PORTFOLIO -->
<div id="portfolioTab">
<div class="card">
<input id="coin" placeholder="Coin">
<input id="amount" placeholder="Amount">
<input id="price" placeholder="Buy Price">
<button onclick="addTrade()">Add Trade</button>
</div>

<div id="portfolio"></div>
<h2 id="total"></h2>
<h3 id="profit"></h3>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="hidden">
<canvas id="chart"></canvas>
</div>

<!-- REWARDS -->
<div id="rewardsTab" class="hidden">
<div class="card">
<h3>Rewards</h3>
<div id="rewardsList"></div>
<p id="rewardTotal"></p>
<div style="background:#222;height:10px;">
<div id="gasBar" style="background:purple;height:10px;width:0%"></div>
</div>
</div>
</div>

<!-- ELITE -->
<div id="eliteTab" class="hidden">
<div class="card">
<div id="platformData"></div>
<div id="riskData"></div>
<div id="tradeHistory"></div>
<div id="taxData"></div>
<div id="insightData"></div>
</div>
</div>

<!-- ALERTS -->
<div id="alertsTab" class="hidden">
<div class="card">
<input id="alertCoin">
<input id="alertPrice">
<button onclick="addAlert()">Alert</button>
</div>
</div>

<!-- STAKING -->
<div id="stakingTab" class="hidden">
<div class="card">
<input id="stakeCoin">
<input id="stakeAmount">
<button onclick="addStake()">Stake</button>
</div>
</div>

<!-- NAV -->
<div class="tabs">
<button onclick="tab('portfolioTab')">💰</button>
<button onclick="tab('analyticsTab')">📊</button>
<button onclick="tab('rewardsTab')">💎</button>
<button onclick="tab('eliteTab')">🧠</button>
<button onclick="tab('alertsTab')">🔔</button>
<button onclick="tab('stakingTab')">🏦</button>
</div>

<script>

// GLOBAL STATE
let chartInstance;
let GLOBAL_DATA = {};

// TAB
function tab(id){
["portfolioTab","analyticsTab","alertsTab","stakingTab","eliteTab","rewardsTab","settingsTab"]
.forEach(t=>{
const el=document.getElementById(t);
if(el) el.classList.add("hidden");
});

const el=document.getElementById(id);
if(el){
el.classList.remove("hidden");
el.style.animation="fadeIn .3s";
}
}

// LOAD DATA
async function load(){
try{
const res = await fetch("/sync");
const data = await res.json();
GLOBAL_DATA = data;

renderPortfolio(data);
renderRewards(data);
renderElite(data);

}catch(e){
console.log("sync failed", e);
}
}

// =====================
// 💰 PORTFOLIO
// =====================
function renderPortfolio(data){

let total=0;
let profit=0;

portfolio.innerHTML="";

data.trades.forEach(t=>{
const p=data.prices[t.coin]||0;
const value=t.amount*p;
const cost=t.amount*t.price;

total+=value;
profit+=value-cost;

portfolio.innerHTML+=`
<div class="card">
<h3>${t.coin}</h3>
<p>$${value.toFixed(2)}</p>
<p class="${value-cost>=0?'profit':'loss'}">
${(value-cost).toFixed(2)}
</p>
</div>`;
});

// ADD EXCHANGE BALANCES
data.balances?.forEach(b=>{
total += b.usdValue;

portfolio.innerHTML+=`
<div class="card">
<h3>${b.currency} (${b.platform})</h3>
<p>$${b.usdValue.toFixed(2)}</p>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total.toFixed(2);
document.getElementById("profit").innerText="Profit: $"+profit.toFixed(2);

// CHART
const labels=[];
const values=[];

data.balances?.forEach(b=>{
labels.push(b.currency);
values.push(b.usdValue);
});

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(chart,{
type:"doughnut",
data:{labels,datasets:[{data:values}]}
});
}

// =====================
// 💎 REWARDS SYSTEM
// =====================
function renderRewards(data){

if(!document.getElementById("rewardsList")) return;

let rewardsHTML="";
let totalRewards=0;

// MANUAL
data.rewards.forEach(r=>{
totalRewards+=r.amount;
rewardsHTML+=`<p>${r.coin}: ${r.amount}</p>`;
});

// AUTO GEMINI XRP DETECTION
data.transactions?.forEach(tx=>{
if(tx.currency === "XRP" && tx.type === "Credit"){
const amt=parseFloat(tx.amount||0);
if(amt>0){
totalRewards+=amt;

rewardsHTML+=`
<p>🔥 XRP Reward: ${amt.toFixed(4)}</p>
`;
}
}
});

document.getElementById("rewardsList").innerHTML=rewardsHTML;
document.getElementById("rewardTotal").innerText="Total Rewards: "+totalRewards.toFixed(4);

// GAS TRACKING
let gasSpend=0;
data.transactions?.forEach(tx=>{
if(tx.type==="Debit" && tx.description?.toLowerCase().includes("gas")){
gasSpend+=parseFloat(tx.amount||0);
}
});

let percent=(gasSpend/300)*100;
document.getElementById("gasBar").style.width=Math.min(percent,100)+"%";
}

// =====================
// 🧠 ELITE DASHBOARD
// =====================
function renderElite(data){

// PLATFORM
let platforms={};
data.balances?.forEach(b=>{
if(!platforms[b.platform]) platforms[b.platform]=0;
platforms[b.platform]+=b.usdValue;
});

let html="<h4>Platforms</h4>";
for(let p in platforms){
html+=`<p>${p}: $${platforms[p].toFixed(2)}</p>`;
}
platformData.innerHTML=html;


// DRAWDOWN
let values=data.balances?.map(b=>b.usdValue)||[];
let peak=Math.max(...values,0);
let current=values.reduce((a,b)=>a+b,0);

let drawdown=peak>0?((peak-current)/peak*100):0;

riskData.innerHTML=`
<h4>Risk</h4>
<p>Drawdown: ${drawdown.toFixed(2)}%</p>
`;


// TRADE HISTORY
let historyHTML="<h4>Trades</h4>";
data.trades.forEach(t=>{
const p=data.prices[t.coin]||0;
const val=t.amount*p;
const cost=t.amount*t.price;

historyHTML+=`
<p>${t.coin} $${cost.toFixed(2)} → $${val.toFixed(2)}</p>
`;
});
tradeHistory.innerHTML=historyHTML;


// TAX
let cost=0,value=0;
data.trades.forEach(t=>{
cost+=t.amount*t.price;
value+=t.amount*(data.prices[t.coin]||0);
});

taxData.innerHTML=`
<h4>Tax</h4>
<p>Cost: $${cost.toFixed(2)}</p>
<p>Value: $${value.toFixed(2)}</p>
<p>PnL: $${(value-cost).toFixed(2)}</p>
`;


// INSIGHTS
let best=null,worst=null;

data.trades.forEach(t=>{
const pnl=(t.amount*(data.prices[t.coin]||0))-(t.amount*t.price);

if(!best||pnl>best.pnl) best={coin:t.coin,pnl};
if(!worst||pnl<worst.pnl) worst={coin:t.coin,pnl};
});

insightData.innerHTML=`
<h4>Insights</h4>
<p>Best: ${best?.coin||"-"} ($${best?.pnl?.toFixed(2)||0})</p>
<p>Worst: ${worst?.coin||"-"} ($${worst?.pnl?.toFixed(2)||0})</p>
`;
}

// =====================
// ➕ ADD FUNCTIONS
// =====================
async function addTrade(){
await fetch("/trade",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
coin:coin.value.toUpperCase(),
amount:+amount.value,
price:+price.value
})
});
load();
}

async function addStake(){
await fetch("/stake",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
coin:stakeCoin.value,
amount:+stakeAmount.value
})
});
}

async function addAlert(){
await fetch("/alert",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
coin:alertCoin.value,
price:+alertPrice.value
})
});
}

// AUTO REFRESH
setInterval(load,5000);


</script>

</body>
</html>
