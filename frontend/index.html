<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>999 Crypto</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

header {
  padding:20px;
  text-align:center;
  font-size:24px;
  background:linear-gradient(90deg,#6d28d9,#9333ea);
}

.card {
  background:#0f172a;
  margin:15px;
  padding:15px;
  border-radius:12px;
}

button {
  background:#7c3aed;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  margin:5px;
  cursor:pointer;
}

button:hover {
  background:#a855f7;
}

.value {
  font-size:22px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>999 Portfolio 💜</header>

<div class="card">
  <h3>Total Portfolio</h3>
  <div id="total" class="value">$0</div>
</div>

<div class="card">
  <h3>Balances</h3>
  <div id="balances"></div>
</div>

<div class="card">
  <button onclick="loadData()">Refresh</button>
</div>

<script>

const API = "https://YOUR-RENDER-URL.onrender.com"; // REPLACE THIS

async function loadData() {
  const res = await fetch(API + "/sync");
  const data = await res.json();

  let total = 0;
  let html = "";

  const prices = {
    BTC: 70000,
    ETH: 3500,
    XRP: 0.6
  };

  data.gemini.forEach(c => {
    const usd = (prices[c.currency] || 1) * parseFloat(c.amount);
    total += usd;

    html += `
      <div>
        ${c.currency}: ${c.amount}
        <br>
        💵 $${usd.toFixed(2)}
      </div><hr>
    `;
  });

  document.getElementById("balances").innerHTML = html;
  document.getElementById("total").innerText = "$" + total.toFixed(2);
}

// auto refresh
setInterval(loadData, 10000);

loadData();

</script>

</body>
</html>
