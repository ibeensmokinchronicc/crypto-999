<!DOCTYPE html>
<html>
<head>
  <title>999 Crypto App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#9333ea">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-512.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at center, #0a0a0a, #000000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 2.5s forwards;
      animation-delay: 2s;
    }

    #logo {
      width: 160px;
      animation: glow 2s infinite alternate, zoom 1.5s ease;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px #9333ea); }
      to { filter: drop-shadow(0 0 40px #9333ea); }
    }

    @keyframes zoom {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    h1 {
      color: #b026ff;
      text-shadow: 0 0 20px #9333ea, 0 0 40px #6b21a8;
    }

    .card {
      background: rgba(20,20,20,0.85);
      margin: 15px auto;
      padding: 15px;
      width: 300px;
      border-radius: 14px;
      border: 1px solid rgba(147,51,234,0.3);
      box-shadow: 0 0 15px rgba(147,51,234,0.4);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #9333ea;
      background: black;
      color: white;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #9333ea, #6b21a8);
      color: white;
    }

    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(10,10,10,0.9);
      border-top: 1px solid #9333ea;
      display: flex;
      justify-content: space-around;
      padding: 12px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="/icon-512.png" id="logo">
</div>

<canvas id="bg"></canvas>

<h1>999 Crypto App</h1>

<div id="portfolioTab">

  <input id="coinName" placeholder="Coin">
  <input id="coinAmount" placeholder="Amount">
  <input id="coinCost" placeholder="Buy Price">
  <button onclick="addManual()">Add</button>

  <canvas id="chart"></canvas>

  <div id="portfolio"></div>
  <h2 id="total"></h2>
  <h3 id="profitTotal"></h3>

</div>

<div class="tabs">
  <button onclick="showTab('portfolio')">Portfolio</button>
</div>

<script>

// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = Array.from({length:50},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  d:Math.random()*1
}));

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(147,51,234,0.6)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.d;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// STORAGE
let coins = JSON.parse(localStorage.getItem("coins")) || [];

function save(){
  localStorage.setItem("coins",JSON.stringify(coins));
}

// ADD COIN
function addManual(){
  coins.push({
    currency:coinName.value.toUpperCase(),
    amount:+coinAmount.value,
    cost:+coinCost.value
  });
  save();
  loadData();
}

// LOAD
let chart;

async function loadData(){
  const res = await fetch("/sync");
  const data = await res.json();

  let total=0, profitTotal=0;
  let labels=[], values=[];

  portfolio.innerHTML="";

  coins.forEach(c=>{
    const price = data.prices[c.currency]||0;
    const val = c.amount*price;
    const profit = val-(c.amount*c.cost);

    total+=val;
    profitTotal+=profit;

    labels.push(c.currency);
    values.push(val);

    portfolio.innerHTML+=`
      <div class="card">
        <h3>${c.currency}</h3>
        <p>$${val.toFixed(2)}</p>
        <p style="color:${profit>=0?'#22c55e':'#ef4444'}">
          ${profit>=0?'+':''}$${profit.toFixed(2)}
        </p>
      </div>
    `;
  });

  total.innerText="Total: $"+total.toFixed(2);
  profitTotal.innerText="Profit: $"+profitTotal.toFixed(2);

  if(chart) chart.destroy();
  chart = new Chart(chartCanvas,{type:"doughnut",data:{labels,datasets:[{data:values}]}})
}

// INIT
loadData();
setInterval(loadData,5000);

// SPLASH REMOVE
window.onload=()=>setTimeout(()=>{
  splash.style.display="none";
},3000);

// SW
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
