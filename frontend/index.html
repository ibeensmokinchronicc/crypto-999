<!DOCTYPE html>
<html>
<head>
  <title>999 Crypto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background:black; color:white; text-align:center; }
    .card { background:#111; margin:10px; padding:10px; border-radius:10px; }
    button { background:#9333ea; color:white; padding:10px; }
  </style>
</head>

<body>

<h1>999 Crypto</h1>

<input type="file" id="csv">
<button onclick="importCSV()">Import CSV</button>

<button onclick="exportTaxes()">Export Tax CSV</button>

<div id="portfolio"></div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

// ===== CSV IMPORT =====
function importCSV() {
  const file = document.getElementById("csv").files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const lines = e.target.result.split("\n");

    lines.forEach(l => {
      const row = l.split(",");
      if (row.length > 3) {
        trades.push({
          coin: row[1],
          amount: parseFloat(row[2]),
          price: parseFloat(row[3])
        });
      }
    });

    localStorage.setItem("trades", JSON.stringify(trades));
    alert("Imported!");
  };

  reader.readAsText(file);
}

// ===== TAX EXPORT =====
function exportTaxes() {
  let csv = "Coin,Amount,Price\n";

  trades.forEach(t => {
    csv += `${t.coin},${t.amount},${t.price}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "taxes.csv";
  a.click();
}

// ===== LOAD =====
async function load() {
  const res = await fetch("/sync");
  const data = await res.json();

  portfolio.innerHTML = "";

  data.balances.forEach(c => {
    portfolio.innerHTML += `
      <div class="card">
        ${c.currency}: $${c.usdValue.toFixed(2)}
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
