<!DOCTYPE html>
<html>
<head>
  <title>999 Crypto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle,#0a0a0a,#000);
  color:white;
}

h1 {
  text-align:center;
  color:#c084fc;
  text-shadow:0 0 20px #9333ea;
}

.card {
  background:rgba(20,20,20,0.7);
  margin:12px auto;
  padding:14px;
  width:92%;
  max-width:360px;
  border-radius:16px;
  border:1px solid rgba(147,51,234,0.2);
  backdrop-filter:blur(10px);
  box-shadow:0 0 15px rgba(147,51,234,0.2);
  animation:fadeIn .5s;
}

button {
  padding:10px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#9333ea,#6b21a8);
  color:white;
}

.tabs {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  border-top:1px solid #9333ea;
}

.hidden { display:none; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.profit { color:#22c55e; }
.loss { color:#ef4444; }
</style>
</head>

<body>

<h1>999 Crypto</h1>

<canvas id="bg"></canvas>

<!-- PORTFOLIO -->
<div id="portfolioTab">
  <div class="card">
    <input id="coin" placeholder="Coin">
    <input id="amount" placeholder="Amount">
    <input id="price" placeholder="Buy Price">
    <button onclick="addTrade()">Add</button>
  </div>

  <div id="portfolio"></div>
  <h2 id="total"></h2>
  <h3 id="profit"></h3>

  <canvas id="chart"></canvas>
</div>

<!-- ANALYTICS -->
<div id="analyticsTab" class="hidden">
  <canvas id="historyChart"></canvas>
  <h3 id="insights"></h3>
</div>

<!-- REWARDS -->
<div id="rewardsTab" class="hidden">
  <div class="card">
    <h3>XRP Rewards</h3>
    <p id="rewards"></p>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsTab" class="hidden">
  <div class="card">
    <input type="file" id="csv">
    <button onclick="importCSV()">Import CSV</button>
    <button onclick="exportCSV()">Export Taxes</button>
  </div>
</div>

<!-- NAV -->
<div class="tabs">
  <button onclick="tab('portfolioTab')">💰</button>
  <button onclick="tab('analyticsTab')">📊</button>
  <button onclick="tab('rewardsTab')">💳</button>
  <button onclick="tab('settingsTab')">⚙️</button>
</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

function save(){
  localStorage.setItem("trades",JSON.stringify(trades));
  localStorage.setItem("history",JSON.stringify(history));
}

function tab(id){
  ["portfolioTab","analyticsTab","rewardsTab","settingsTab"]
  .forEach(t=>document.getElementById(t).classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");
}

function addTrade(){
  trades.push({
    coin:coin.value.toUpperCase(),
    amount:+amount.value,
    price:+price.value
  });
  save();
  load();
}

// 🔥 REAL-TIME LOOP
setInterval(load, 5000);

async function load(){
  const res = await fetch("/sync");
  const data = await res.json();

  let total=0, profit=0;
  let labels=[], values=[];

  portfolio.innerHTML="";

  trades.forEach(t=>{
    const p=data.prices[t.coin]||0;
    const val=t.amount*p;
    const cost=t.amount*t.price;

    total+=val;
    profit+=val-cost;

    labels.push(t.coin);
    values.push(val);

    portfolio.innerHTML+=`
      <div class="card">
        <h3>${t.coin}</h3>
        <p>$${val.toFixed(2)}</p>
        <p class="${val-cost>=0?'profit':'loss'}">
          ${(val-cost).toFixed(2)}
        </p>
      </div>
    `;
  });

  total.innerText="Total: $"+total.toFixed(2);
  profitEl.innerText="Profit: $"+profit.toFixed(2);

  history.push({time:Date.now(),value:total});
  if(history.length>50) history.shift();

  save();

  if(window.chart) chart.destroy();
  chart = new Chart(chartCanvas,{type:"doughnut",data:{labels,datasets:[{data:values}]}});

  if(window.hChart) hChart.destroy();
  hChart = new Chart(historyChart,{
    type:"line",
    data:{
      labels:history.map(h=>new Date(h.time).toLocaleTimeString()),
      datasets:[{data:history.map(h=>h.value)}]
    }
  });

  insights.innerText =
    history.length>1 && history.at(-1).value>history.at(-2).value
    ? "📈 Uptrend" : "📉 Downtrend";

  rewards.innerText =
    trades.filter(t=>t.coin==="XRP").length+" reward entries";
}

// CSV
function importCSV(){
  const file=document.getElementById("csv").files[0];
  const reader=new FileReader();

  reader.onload=e=>{
    e.target.result.split("\n").forEach(l=>{
      const r=l.split(",");
      if(r.length>3){
        trades.push({coin:r[1],amount:+r[2],price:+r[3]});
      }
    });
    save(); load();
  };

  reader.readAsText(file);
}

function exportCSV(){
  let csv="Coin,Amount,Price\n";
  trades.forEach(t=>{
    csv+=`${t.coin},${t.amount},${t.price}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="taxes.csv";
  a.click();
}

// PARTICLES
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");
bg.width=window.innerWidth;
bg.height=window.innerHeight;

let particles=Array.from({length:30},()=>({
  x:Math.random()*bg.width,
  y:Math.random()*bg.height,
  r:Math.random()*2,
  d:Math.random()*0.4
}));

function draw(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.fillStyle="rgba(147,51,234,0.3)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.d;
    if(p.y>bg.height)p.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

load();

</script>
</body>
</html>
