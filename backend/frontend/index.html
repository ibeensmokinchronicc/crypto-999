<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>999 Ultimate</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background: radial-gradient(circle at top,#1a0b2e,#020617);
  color:white;
}
.header { padding:16px; font-size:22px; color:#c084fc; }
.total { text-align:center; font-size:40px; }
.card { background:#0f172a; margin:10px; padding:12px; border-radius:12px; }
.coin { display:flex; justify-content:space-between; padding:8px 0; }
.bottom {
  position:fixed; bottom:0; width:100%;
  display:flex; justify-content:space-around;
  padding:10px; background:#020617;
}
button {
  background:#7c3aed;
  border:none; padding:8px 12px;
  color:white; border-radius:10px;
}
textarea, input {
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="header">🖤 999 Ultimate</div>

<div class="total" id="total">$0</div>
<div id="profit"></div>

<canvas id="chart"></canvas>

<div class="card"><b>🤖 AI</b><div id="ai"></div></div>
<div class="card"><b>📊 Stats</b><div id="stats"></div></div>
<div class="card"><b>💰 Holdings</b><div id="coins"></div></div>
<div class="card"><b>🏦 Platforms</b><div id="platforms"></div></div>

<div class="card">
<b>📂 Import Trades CSV</b>
<textarea id="csv"></textarea>
<button onclick="importCSV()">Import</button>
</div>

<div class="card">
<b>☁️ Sync</b>
<button onclick="exportData()">Export</button>
<input id="importBox" placeholder="Paste data here">
<button onclick="importData()">Import</button>
</div>

<div class="bottom">
<button onclick="load()">Refresh</button>
<button onclick="addWallet()">+Wallet</button>
<button onclick="toggleAI()">AI</button>
</div>

<script>
const API = "https://crypto-999.onrender.com";

let history = JSON.parse(localStorage.getItem("h") || "[]");
let trades = JSON.parse(localStorage.getItem("trades") || "[]");
let wallets = JSON.parse(localStorage.getItem("wallets") || "[]");

let chart;
let aiOn = true;

/* PRICE */
function price(sym, p) {
  if(sym==="BTC") return p.bitcoin?.usd || 0;
  if(sym==="ETH") return p.ethereum?.usd || 0;
  if(sym==="XRP") return p.ripple?.usd || 0;
  return 0;
}

/* AI */
function getAI() {
  if(!aiOn) return "AI OFF";
  if(history.length < 3) return "Loading...";

  let l = history.slice(-3);

  if(l[2] > l[1] && l[1] > l[0]) return "📈 Uptrend";
  if(l[2] < l[1]) return "⚠️ Downtrend";
  return "➡️ Sideways";
}

/* RISK */
function riskStats() {
  let max = Math.max(...history, 0);
  let cur = history[history.length-1] || 0;

  let dd = ((max - cur) / max * 100 || 0).toFixed(2);

  return `Drawdown: ${dd}%`;
}

/* ROI */
function roi(total) {
  let start = history[0] || total;
  return ((total - start) / start * 100).toFixed(2);
}

/* AVG PRICE */
function avgPrice(sym){
  let total=0, amt=0;

  trades.forEach(t=>{
    if(t.coin===sym && t.type==="buy"){
      total += t.amount * t.price;
      amt += t.amount;
    }
  });

  return amt ? total/amt : 0;
}

/* CSV IMPORT */
function importCSV(){
  let rows = csv.value.split("\n");

  rows.forEach(r=>{
    let [coin,type,amount,price] = r.split(",");
    if(!coin) return;

    trades.push({
      coin: coin.trim(),
      type: type.trim(),
      amount: +amount,
      price: +price
    });
  });

  localStorage.setItem("trades", JSON.stringify(trades));
  alert("Trades imported");
}

/* SYNC */
function exportData(){
  alert(JSON.stringify({ trades, history, wallets }));
}

function importData(){
  let d = JSON.parse(importBox.value);

  trades = d.trades || [];
  history = d.history || [];
  wallets = d.wallets || [];

  localStorage.setItem("trades", JSON.stringify(trades));
}

/* WALLET */
function addWallet(){
  let coin = prompt("Coin (BTC, ETH, XRP)");
  let amount = +prompt("Amount");

  wallets.push({ coin, amount });
  localStorage.setItem("wallets", JSON.stringify(wallets));
}

/* MAIN LOAD */
async function load(){
  const res = await fetch(API + "/sync");
  const data = await res.json();

  let total = 0;
  coins.innerHTML = "";
  platforms.innerHTML = "";

  let map = { Gemini:0, Coinbase:0, Wallet:0 };

  function add(sym, amt, platform){
    const val = amt * price(sym, data.prices);

    if(val <= 0) return;

    total += val;
    map[platform] += val;

    let avg = avgPrice(sym);

    const row = document.createElement("div");
    row.className = "coin";

    row.innerHTML = `
      ${sym}
      <span>
        $${val.toFixed(2)}<br>
        <small style="color:#a855f7">Avg: $${avg.toFixed(2)}</small>
      </span>
    `;

    coins.appendChild(row);
  }

  data.gemini.forEach(c => add(c.currency, +c.amount, "Gemini"));
  data.coinbase.forEach(c => add(c.currency, +c.available_balance?.value || 0, "Coinbase"));
  wallets.forEach(w => add(w.coin, w.amount, "Wallet"));

  history.push(total);
  if(history.length > 80) history.shift();

  localStorage.setItem("h", JSON.stringify(history));

  totalEl.innerText = "$" + total.toFixed(2);
  profit.innerText = "ROI: " + roi(total) + "%";
  ai.innerText = getAI();
  stats.innerText = riskStats();

  Object.keys(map).forEach(p=>{
    let row = document.createElement("div");
    row.innerText = `${p}: $${map[p].toFixed(2)}`;
    platforms.appendChild(row);
  });

  drawChart();
}

/* CHART */
function drawChart(){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: history.map((_,i)=>i),
      datasets: [{
        data: history,
        borderColor: "#a855f7",
        tension: 0.3
      }]
    },
    options: {
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  });
}

/* ALERTS */
setInterval(()=>{
  if(history.length < 2) return;

  let l = history.slice(-2);

  if(l[1] > l[0] * 1.05) alert("🚀 Portfolio up 5%");
  if(l[1] < l[0] * 0.95) alert("⚠️ Portfolio down 5%");
}, 10000);

/* TOGGLE AI */
function toggleAI(){
  aiOn = !aiOn;
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

/* AUTO LOAD */
setInterval(load, 8000);
load();
</script>

</body>
</html>
